databases:
  - name: daarvi-db
    databaseName: daarvi
    user: daarvi
    plan: free          # upgrade to starter/standard for production

services:
  - type: web
    name: daarvi-api
    runtime: python
    plan: free          # upgrade to starter for no sleep / custom domain
    pythonVersion: "3.12.0"
    buildCommand: pip install uv && uv pip install --system --no-cache -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health

    envVars:
      # Render injects the Postgres connection string automatically.
      # It comes as  postgres://...  which config.py converts to
      # postgresql+asyncpg://...  so asyncpg works.
      - key: DATABASE_URL
        fromDatabase:
          name: daarvi-db
          property: connectionString

      # Auto-generated 64-char random secret — rotates on each new deploy
      # if you want a stable secret, replace generateValue with a fixed value.
      - key: SECRET_KEY
        generateValue: true

      # ── CORS ────────────────────────────────────────────────────────────────
      # After your first Vercel deploy, add your Vercel URL here, e.g.:
      #   https://daarvi.vercel.app,http://localhost:5173
      # Then redeploy this service so the new origin is accepted.
      - key: ALLOWED_ORIGINS
        value: http://localhost:5173,http://127.0.0.1:5173

      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30

      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: 7
